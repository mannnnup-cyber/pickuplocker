<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pickup - Connecting...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111111;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 40px 24px;
        }
        .logo {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: 6px;
            margin-bottom: 8px;
        }
        .logo span { color: #FFD439; }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 48px;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #333;
            border-top-color: #FFD439;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 32px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .message {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .detail {
            color: #888;
            font-size: 14px;
            line-height: 1.6;
            max-width: 360px;
        }
        .retry-hint {
            color: #FFD439;
            font-size: 13px;
            margin-top: 32px;
        }
        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="logo">PICK<span>UP</span></div>
    <div class="subtitle">Smart Locker System</div>
    <div class="spinner" id="spinner"></div>
    <div class="message pulse" id="message">Connecting...</div>
    <div class="detail" id="detail">
        Checking connection to the locker server.
    </div>
    <div class="retry-hint" id="retryHint">Will reconnect automatically</div>

    <script>
        var retryCount = 0;
        var maxRetries = 60; // 5 minutes at 5s intervals
        var targetUrl = 'https://pickuplocker.vercel.app/kiosk-lite';

        // Try to reconnect periodically
        function tryReconnect() {
            retryCount++;
            var msgEl = document.getElementById('message');
            var detailEl = document.getElementById('detail');
            var hintEl = document.getElementById('retryHint');

            if (retryCount <= 3) {
                msgEl.textContent = 'Connecting...';
                detailEl.textContent = 'Checking connection to the locker server.';
            } else if (retryCount <= 12) {
                msgEl.textContent = 'No Connection';
                detailEl.textContent = 'The locker server is not reachable. Please check the WiFi connection on this device.';
            } else {
                msgEl.textContent = 'Connection Lost';
                detailEl.textContent = 'Unable to reach the locker server for over a minute. The kiosk will reconnect automatically once the network is restored.';
            }

            hintEl.textContent = 'Retry ' + retryCount + ' of ' + maxRetries + ' — will reconnect automatically';

            // Attempt to fetch the target URL
            fetch(targetUrl, { method: 'HEAD', mode: 'no-cors', cache: 'no-store' })
                .then(function() {
                    // Server is reachable — redirect
                    window.location.href = targetUrl;
                })
                .catch(function() {
                    // Still offline — retry in 5 seconds
                    if (retryCount < maxRetries) {
                        setTimeout(tryReconnect, 5000);
                    } else {
                        msgEl.textContent = 'Extended Outage';
                        detailEl.textContent = 'The locker server has been unreachable for an extended period. Please contact support or restart this device.';
                        hintEl.textContent = 'Retries exhausted — please restart the kiosk device';
                        document.getElementById('spinner').style.display = 'none';
                    }
                });
        }

        // Start retry loop after 3 seconds
        setTimeout(tryReconnect, 3000);
    </script>
</body>
</html>
